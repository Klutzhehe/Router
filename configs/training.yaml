
# Training & DreamerV3 training hyperparameters
training:
  total_timesteps: 5_000_000
  eval_interval: 10_000        # evaluate every N timesteps
  save_interval: 50_000        # save checkpoint every N timesteps
  log_interval: 1_000          # log metrics every N timesteps
  visual_save_interval: 5_000  # save PNG visual checkpoint every N timesteps (not every iteration)
  seed: 42
  
  real_steps_per_iteration: 64
  train_ratio: 100
  replay_buffer_size: 5000
  batch_size: 256              # increased from 128 for higher VRAM usage and faster training
  seq_len: 200
  routing_mode: "autoregressive"
  imagine_batch_size: 4096     # increased from 2048 for higher VRAM usage and faster training
  imagination_horizon_start: 5
  imagination_horizon_end: 15
  imagination_horizon_ramp_iters: 20000
  latent_cache_capacity: 500000 # increased from 10000; utilizes available RAM for historical diversity

  world_model_lr: 3.0e-4
  actor_lr: 8.0e-5
  critic_lr: 8.0e-5
  wm_weight_decay: 1.0e-6
  wm_grad_clip: 100.0
  actor_grad_clip: 100.0
  critic_grad_clip: 100.0

  gamma: 0.997
  lambda_: 0.95

  entropy_coef_start: 3.0e-2
  entropy_coef_end: 3.0e-3
  entropy_coef_decay_iters: 50000

  use_amp: true
  compile_models: true
  critic_target_ema: 0.98

# Checkpointing (for Colab session recovery)
checkpoint:
  save_dir: "checkpoints/"
  keep_last_n: 3
  save_optimizer: true
  save_curriculum_state: true

