# PPO Hyperparameters
ppo:
  learning_rate: 3.0e-4
  gamma: 0.99                  # discount factor
  gae_lambda: 0.95             # GAE lambda
  clip_epsilon: 0.2            # PPO clipping
  value_loss_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  num_epochs: 3                # PPO update epochs per batch (reduced from 4; same total updates with larger batch)
  batch_size: 32               # increased from 16; better GPU utilization
  num_rollout_steps: 64        # reduced from 128; fewer board deepcopies accumulate in buffer
  num_envs: 4                  # parallel environments

# JEPA Loss Weights
jepa_loss:
  prediction_weight: 0.01      # lambda_1: JEPA prediction loss weight (reduced from 1.0 — at scale 1.0 JEPA ~43 dwarfs policy ~0.04, killing PPO signal)
  vicreg_weight: 0.1           # lambda_2: VICReg regularization weight

# Optimizer
optimizer:
  type: adamw
  weight_decay: 0.01
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Learning Rate Schedule
lr_schedule:
  type: cosine
  warmup_steps: 1000
  min_lr: 1.0e-6

# Training
training:
  total_timesteps: 5_000_000
  eval_interval: 10_000        # evaluate every N timesteps
  save_interval: 50_000        # save checkpoint every N timesteps
  log_interval: 1_000          # log metrics every N timesteps
  visual_save_interval: 5_000  # save PNG visual checkpoint every N timesteps (not every iteration)
  seed: 42

# Checkpointing (for Colab session recovery)
checkpoint:
  save_dir: "checkpoints/"
  keep_last_n: 3
  save_optimizer: true
  save_curriculum_state: true


# DreamerV3 training hyperparameters
training:
  real_steps_per_iteration: 64
  train_ratio: 100
  replay_buffer_size: 5000
  batch_size: 256
  seq_len: 50
  imagine_batch_size: 4096
  imagination_horizon_start: 5
  imagination_horizon_end: 15
  imagination_horizon_ramp_iters: 20000

  world_model_lr: 3.0e-4
  actor_lr: 8.0e-5
  critic_lr: 8.0e-5
  wm_weight_decay: 1.0e-6
  wm_grad_clip: 100.0
  actor_grad_clip: 100.0
  critic_grad_clip: 100.0

  gamma: 0.997
  lambda_: 0.95

  entropy_coef_start: 3.0e-3
  entropy_coef_end: 3.0e-4
  entropy_coef_decay_iters: 50000

  use_amp: true
  compile_models: true
  critic_target_ema: 0.98

