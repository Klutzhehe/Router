
# Training & DreamerV3 training hyperparameters
training:
  total_timesteps: 5_000_000
  eval_interval: 10_000        # evaluate every N timesteps
  save_interval: 50_000        # save checkpoint every N timesteps
  log_interval: 1_000          # log metrics every N timesteps
  visual_save_interval: 5_000  # save PNG visual checkpoint every N timesteps (not every iteration)
  seed: 42
  
  real_steps_per_iteration: 64
  train_ratio: 4               # gradient updates per iteration. Dropped to 4 to prevent over-optimization and stabilize training
                               # against a still-wrong world model; the actor sprinted into the
                               # reward model's blind spots (corner-walk exploit) faster than the
                               # WM could correct. DreamerV3 uses O(8-32).
  replay_buffer_size: 5000
  batch_size: 128              # was 256; halved to cut phase-2 sequential-GRU cost
  seq_len: 64                  # was 200; a 200-step BPTT graph is far longer than DreamerV3's ~64
  routing_mode: "autoregressive"
  imagine_batch_size: 512      # was 4096; combined with train_ratio this is ~50x less phase-3 compute
  imagination_horizon_start: 5
  imagination_horizon_end: 15
  imagination_horizon_ramp_iters: 20000
  latent_cache_capacity: 50000 # was 500000 (~3GB of RAM churn); trimmed to reduce swapping

  # Analytic imagination reward (autoregressive step routing). The step reward is a known
  # closed form (distance-to-target progress + turn/via penalties), so we compute it exactly
  # inside imagination instead of trusting the learned reward head — which could not even see
  # cursor/target geometry and hallucinated "diagonal = good", producing the corner-walk.
  imagination_completion_bonus: 3.0   # bonus when the imagined cursor reaches the target pin
  imagination_reach_threshold: 3      # cells of xy tolerance for "reached" (matches env pad half-size)

  # Encoder (ViT/GNN/Fusion) fine-tuning during RL via the JEPA self-supervised loss.
  # The big replay buffer stores tiny detached embeddings (cheap), so it cannot backprop into
  # the encoders. Instead we keep a small, bounded buffer of RECENT raw observations and run a
  # JEPA predict+VICReg loss on those with gradients enabled, so the representation keeps
  # improving instead of staying frozen at its BC-pretrained state. Set train_encoders: false
  # to disable (encoders stay frozen, lower RAM/compute — the previously-verified fast path).
  train_encoders: true
  encoder_raw_buffer_size: 1200       # max recent raw transitions kept (rasters are large;
                                      # lower at the biggest board stages if host RAM is tight)
  encoder_train_batch: 8              # short sequences recomputed per encoder update
  encoder_seq_len: 12                 # length of each recomputed sequence (JEPA predict window)
  encoder_grad_clip: 100.0

  world_model_lr: 3.0e-4
  actor_lr: 8.0e-5
  critic_lr: 3.0e-5
  wm_weight_decay: 1.0e-6
  wm_grad_clip: 100.0
  actor_grad_clip: 100.0
  critic_grad_clip: 100.0

  gamma: 0.997
  lambda_: 0.95

  entropy_coef_start: 3.0e-2
  entropy_coef_end: 3.0e-3
  entropy_coef_decay_iters: 50000

  use_amp: true
  compile_models: true
  critic_target_ema: 0.98

# Checkpointing (for Colab session recovery)
checkpoint:
  save_dir: "checkpoints/"
  keep_last_n: 3
  save_optimizer: true
  save_curriculum_state: true

